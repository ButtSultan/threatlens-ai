name: ThreatLens AI — CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  lint-backend:
    name: Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install linting dependencies
        run: pip install flake8 black isort
      - name: Lint with flake8
        run: flake8 app/ --max-line-length=120 --extend-ignore=E501,W503,E203,F401,F811 --exclude=__pycache__,migrations || true
      - name: Check formatting
        run: black --check app/ || true
      - name: Check imports
        run: isort --check-only app/ || true

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest ../tests/ -v --tb=short --cov=app --cov-report=xml || true
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          REDIS_URL: "redis://localhost:6379/0"
          SECRET_KEY: "test-secret-key-32-characters-minimum-here"
          ENVIRONMENT: "test"
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-html
          path: backend/htmlcov/
          retention-days: 7

  lint-build-frontend:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: npm install --legacy-peer-deps || true
      - name: Build React application
        run: npm run build || true
        env:
          REACT_APP_API_URL: /api/v1
          CI: false
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 1

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install security tools
        run: pip install bandit safety pip-audit
      - name: Run Bandit
        run: bandit -r app/ -x app/tests -ll || true
      - name: Run Safety
        run: safety check -r requirements.txt || true
      - name: Run pip-audit
        run: pip-audit -r requirements.txt || true
