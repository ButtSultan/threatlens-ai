version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: threatlens_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-threatlens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-threatlens_secure_pass}
      POSTGRES_DB: ${POSTGRES_DB:-threatlens_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-threatlens}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - threatlens_network

  redis:
    image: redis:7-alpine
    container_name: threatlens_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secure_pass}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-redis_secure_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - threatlens_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: threatlens_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-threatlens}:${POSTGRES_PASSWORD:-threatlens_secure_pass}@postgres:5432/${POSTGRES_DB:-threatlens_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secure_pass}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-super_secret_key_change_in_production_32chars}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      ENVIRONMENT: ${ENVIRONMENT:-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:80,http://localhost:3000}
      MAX_FILE_SIZE_MB: 50
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - uploaded_logs:/app/uploads
      - generated_reports:/app/reports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - threatlens_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-/api/v1}
    container_name: threatlens_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - threatlens_network

  nginx:
    image: nginx:alpine
    container_name: threatlens_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - threatlens_network

volumes:
  postgres_data:
  redis_data:
  uploaded_logs:
  generated_reports:

networks:
  threatlens_network:
    driver: bridge
